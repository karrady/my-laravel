<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">

  <!-- Yellow badge -->
  <rect width="80" height="80" rx="12" fill="#f5c518"/>

  <!-- Taxi rooftop sign -->
  <rect x="24" y="10" width="32" height="10" rx="3" fill="#1a1a1a"/>
  <rect x="27" y="12" width="26" height="4" rx="1.5" fill="#f5c518" opacity="0.35"/>

  <!-- Car cabin -->
  <rect x="14" y="19" width="52" height="18" rx="4" fill="#1a1a1a"/>

  <!-- Windows -->
  <rect x="17" y="22" width="20" height="12" rx="2.5" fill="#f5c518"/>
  <rect x="43" y="22" width="20" height="12" rx="2.5" fill="#f5c518"/>

  <!-- Car body -->
  <rect x="6" y="35" width="68" height="18" rx="4" fill="#1a1a1a"/>

  <!-- Rear wheel -->
  <circle cx="24" cy="57" r="11" fill="#1a1a1a"/>
  <circle cx="24" cy="57" r="5.5" fill="#f5c518"/>
  <circle cx="24" cy="57" r="2.2" fill="#1a1a1a"/>

  <!-- Front wheel -->
  <circle cx="56" cy="57" r="11" fill="#1a1a1a"/>
  <circle cx="56" cy="57" r="5.5" fill="#f5c518"/>
  <circle cx="56" cy="57" r="2.2" fill="#1a1a1a"/>

  <!-- Taillight -->
  <rect x="3" y="40" width="5" height="7" rx="2" fill="#f5c518" opacity="0.6"/>

  <!-- Headlight -->
  <rect x="72" y="40" width="5" height="7" rx="2" fill="#f5c518"/>

</svg>
