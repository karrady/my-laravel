<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">

  <rect width="80" height="80" rx="12" fill="#0f0f0f"/>

  <!-- Ring -->
  <circle cx="40" cy="40" r="33" stroke="#f5c518" stroke-width="5"/>

  <!-- Spaak boven -->
  <line x1="40" y1="29" x2="40" y2="9" stroke="#f5c518" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Spaak rechtsonder -->
  <line x1="50" y1="46" x2="68" y2="57" stroke="#f5c518" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Spaak linksonder -->
  <line x1="30" y1="46" x2="12" y2="57" stroke="#f5c518" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Hub -->
  <circle cx="40" cy="40" r="13" fill="#f5c518"/>

  <!-- T -->
  <text x="40" y="45"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-weight="900"
        font-size="14"
        fill="#0f0f0f"
        text-anchor="middle">T</text>

</svg>
