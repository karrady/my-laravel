<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" fill="none">

  <!-- ======= BADGE ======= -->
  <rect x="4" y="4" width="72" height="72" rx="10" fill="#f5c518"/>

  <!-- Taxi rooftop sign -->
  <rect x="28" y="11" width="24" height="8" rx="2.5" fill="#1a1a1a"/>
  <!-- Glow strip on sign -->
  <rect x="30" y="12.5" width="20" height="3" rx="1" fill="#f5c518" opacity="0.35"/>

  <!-- Car cabin -->
  <rect x="18" y="18" width="44" height="15" rx="3" fill="#1a1a1a"/>

  <!-- Windows -->
  <rect x="21" y="20" width="17" height="10" rx="2" fill="#f5c518"/>
  <rect x="42" y="20" width="17" height="10" rx="2" fill="#f5c518"/>

  <!-- Car body -->
  <rect x="10" y="30" width="60" height="16" rx="3" fill="#1a1a1a"/>

  <!-- Rear wheel -->
  <circle cx="26" cy="50" r="9" fill="#1a1a1a"/>
  <circle cx="26" cy="50" r="4.5" fill="#f5c518"/>
  <circle cx="26" cy="50" r="1.8" fill="#1a1a1a"/>

  <!-- Front wheel -->
  <circle cx="54" cy="50" r="9" fill="#1a1a1a"/>
  <circle cx="54" cy="50" r="4.5" fill="#f5c518"/>
  <circle cx="54" cy="50" r="1.8" fill="#1a1a1a"/>

  <!-- Taillight (rear) -->
  <rect x="8" y="34" width="4" height="6" rx="1.5" fill="#f5c518" opacity="0.65"/>

  <!-- Headlight (front) -->
  <rect x="68" y="34" width="4" height="6" rx="1.5" fill="#f5c518"/>

  <!-- ======= TEXT ======= -->
  <text x="92" y="37"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-weight="900"
        font-size="30"
        fill="white">TAXI</text>

  <text x="93" y="59"
        font-family="Arial, 'Helvetica Neue', sans-serif"
        font-weight="400"
        font-size="13"
        letter-spacing="6"
        fill="#f5c518">CENTRALE</text>

  <!-- Thin accent line under CENTRALE -->
  <line x1="92" y1="65" x2="245" y2="65" stroke="#f5c518" stroke-opacity="0.2" stroke-width="1"/>

</svg>
