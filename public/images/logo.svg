<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" fill="none">

  <!-- Stuurwiel icon (center 40,40  ring-r=30  hub-r=12) -->

  <!-- Buitenste ring -->
  <circle cx="40" cy="40" r="30" stroke="#f5c518" stroke-width="5"/>

  <!-- Subtiele binnenste ring -->
  <circle cx="40" cy="40" r="25" stroke="#f5c518" stroke-width="1" opacity="0.15"/>

  <!-- Spaak boven -->
  <line x1="40" y1="28" x2="40" y2="12" stroke="#f5c518" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Spaak rechtsonder -->
  <line x1="50" y1="46" x2="66" y2="55" stroke="#f5c518" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Spaak linksonder -->
  <line x1="30" y1="46" x2="14" y2="55" stroke="#f5c518" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Hub -->
  <circle cx="40" cy="40" r="12" fill="#f5c518"/>

  <!-- T in hub -->
  <text x="40" y="44.5"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-weight="900"
        font-size="13"
        fill="#0f0f0f"
        text-anchor="middle">T</text>

  <!-- Verticale scheidingslijn -->
  <line x1="82" y1="18" x2="82" y2="62" stroke="#f5c518" stroke-width="1" opacity="0.2"/>

  <!-- TAXI -->
  <text x="96" y="38"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-weight="900"
        font-size="28"
        fill="white">TAXI</text>

  <!-- CENTRALE -->
  <text x="97" y="60"
        font-family="Arial, 'Helvetica Neue', sans-serif"
        font-weight="400"
        font-size="13"
        letter-spacing="6"
        fill="#f5c518">CENTRALE</text>

</svg>
