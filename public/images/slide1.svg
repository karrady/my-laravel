<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 700" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Lucht gradient: warm oranje/roze zonsopgang -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4a843"/>
      <stop offset="35%" stop-color="#f8c97a"/>
      <stop offset="65%" stop-color="#fce0b0"/>
      <stop offset="100%" stop-color="#e8b87a"/>
    </linearGradient>
    <!-- Tarmac gradient -->
    <linearGradient id="tarmac" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a4a"/>
      <stop offset="100%" stop-color="#22222e"/>
    </linearGradient>
    <!-- Gebouwen gloed -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Licht gloed voor lampen -->
    <filter id="lampglow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Atmosferische nevel -->
    <linearGradient id="haze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8c97a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#f8c97a" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

